version: "3.8"

services:
  web:
    image: ghcr.io/arthurlongue/nicattobeard:latest
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # HTTP Redirect
      - "traefik.http.routers.nicattobeard-http.rule=Host(`nicatto.artudev.com`)"
      - "traefik.http.routers.nicattobeard-http.entrypoints=web"
      - "traefik.http.routers.nicattobeard-http.middlewares=nicattobeard-redirect"
      - "traefik.http.middlewares.nicattobeard-redirect.redirectscheme.scheme=https"

      # HTTPS Main
      - "traefik.http.routers.nicattobeard.rule=Host(`nicatto.artudev.com`)"
      - "traefik.http.routers.nicattobeard.entrypoints=websecure"
      - "traefik.http.routers.nicattobeard.tls=true"
      - "traefik.http.routers.nicattobeard.tls.certresolver=le"
      - "traefik.http.services.nicattobeard.loadbalancer.server.port=80"

    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
      restart_policy:
        condition: on-failure

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - traefik-public
      - internal

  # Postgres DB is hosted on a separate EasyPanel server/project
  # The Backend will connect to it using an environment variable like `DATABASE_URL`

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge

volumes:
  postgres_data:

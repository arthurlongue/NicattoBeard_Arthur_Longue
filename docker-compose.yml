services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adminpassword}
      POSTGRES_DB: ${POSTGRES_DB:-nicattobeard_db}
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-nicattobeard_db}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${HOST_BACKEND_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-adminpassword}@db:5432/${POSTGRES_DB:-nicattobeard_db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-for-local-docker-123}
      NODE_ENV: development
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    ports:
      - "${HOST_FRONTEND_PORT:-5173}:5173"
    environment:
      FRONTEND_PORT: 5173
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:3001}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/frontend/src
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
